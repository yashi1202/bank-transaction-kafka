name: Bank Transaction Kafka CI/CD
# name = displayed in GitHub Actions UI
# shown in pull requests and Actions tab

on:
  # TRIGGERS — when does this pipeline run?
  push:
    branches:
      - main
      - develop
    # trigger on push to main or develop branch
    # main = production deployments
    # develop = staging/testing deployments

  pull_request:
    branches:
      - main
    # trigger on pull requests targeting main
    # runs CI checks before code is merged
    # prevents broken code from reaching main

  workflow_dispatch:
    # allows manual trigger from GitHub UI
    # useful for emergency deployments
    # or re-running a failed deployment

env:
  # global environment variables available to all jobs
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bank-transaction-kafka
  # ${{ secrets.DOCKER_USERNAME }} = reads from GitHub Secrets
  # GitHub Secrets = encrypted storage for sensitive values
  # NEVER put actual values here in the yaml file

  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx1024m'
  # MAVEN_OPTS = JVM options for Maven itself
  # -Xmx1024m = Maven can use up to 1GB RAM
  # prevents OutOfMemoryError during compilation

# ─── JOBS ─────────────────────────────────────────────────────────
jobs:

# ══════════════════════════════════════════════════════════════════
# JOB 1: TEST
# Runs on every push and pull request
# ══════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    # runs-on = type of server (runner) to use
    # ubuntu-latest = GitHub provides free Ubuntu VM
    # each job gets a fresh VM — no leftover state

    steps:
    # steps = ordered list of tasks in this job
    # each step runs sequentially

      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        # uses = reference a pre-built action
        # actions/checkout = GitHub's official action
        # clones your repository into the runner VM
        # without this, runner has no code to work with

      - name: ☕ Set Up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          # reads JAVA_VERSION from env section above
          distribution: 'temurin'
          # temurin = Eclipse's OpenJDK (free, production-grade)
          # alternatives: corretto (Amazon), zulu, microsoft
          cache: 'maven'
          # cache = save Maven dependencies between runs
          # first run: downloads all deps (~2-3 mins)
          # subsequent runs: uses cache (~20-30 secs)
          # cache key based on pom.xml hash
          # if pom.xml changes → cache invalidated → re-download

      - name: 🔧 Build with Maven (skip tests for speed check)
        run: mvn clean compile -B
        # run = execute shell command on the runner
        # clean = delete previous build artifacts
        # compile = just compile, don't package
        # -B = batch mode (no color, no progress bars — cleaner logs)
        # WHY separate compile step?
        #   catches compilation errors fast before running tests

      - name: 🧪 Run Unit Tests
        run: mvn test -B
        # mvn test = compile + run all tests in src/test/
        # if any test fails → exit code non-zero → job fails
        # GitHub marks the commit as failed

      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        # if: always() = run this step even if previous step failed
        # important: upload test results even when tests fail
        # so you can see WHICH tests failed
        with:
          name: test-results
          path: target/surefire-reports/
          # surefire-reports = Maven's test result XML files
          # uploaded as artifact to GitHub
          # downloadable from Actions UI for inspection
          retention-days: 7
          # keep artifacts for 7 days then auto-delete

# ══════════════════════════════════════════════════════════════════
# JOB 2: BUILD & PUSH DOCKER IMAGE
# Runs only on push to main (not on pull requests)
# ══════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # needs = this job waits for "test" job to succeed
    # if tests fail → this job is skipped
    # dependency chain: test → build-and-push → deploy

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # if condition = only run when:
    # github.ref = the branch that triggered the workflow
    # refs/heads/main = we're on the main branch
    # github.event_name == 'push' = it's a push (not PR)
    # WHY? Don't push Docker images for pull requests
    #   PRs are for review — only merged code gets deployed

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      # outputs = pass data between jobs
      # image-tag from this job used by deploy job

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🏷️ Generate Image Metadata
        id: meta
        # id = give this step a name to reference its outputs
        uses: docker/metadata-action@v5
        # metadata-action = generates Docker tags and labels
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          # type=sha = tag with git commit SHA (e.g. sha-abc1234)
          # WHY SHA tags? Immutable — you know exactly what's deployed
          # type=raw,value=latest = also tag as "latest" on main branch
          # enables: docker pull yourimage:latest (always gets newest)

      - name: 🔑 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          # secrets.DOCKER_USERNAME = your DockerHub username
          # secrets.DOCKER_TOKEN = DockerHub access token
          # WHY token instead of password?
          #   tokens can be scoped (read-only, write, etc.)
          #   tokens can be revoked without changing password
          #   GitHub Secrets encrypts them at rest

      - name: 🏗️ Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx = extended Docker build capabilities
        # enables:
        #   - multi-platform builds (amd64, arm64)
        #   - better layer caching
        #   - BuildKit optimizations
        # your Mac uses arm64, servers usually use amd64
        # Buildx builds for BOTH simultaneously

      - name: 🐳 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # context = build context (folder with Dockerfile)
          # "." = current directory (project root)

          push: true
          # push = after building, push to DockerHub
          # push: false = build only (useful for testing)

          tags: ${{ steps.meta.outputs.tags }}
          # tags from metadata-action step above
          # e.g.: yourname/bank-kafka:sha-abc1234
          #       yourname/bank-kafka:latest

          labels: ${{ steps.meta.outputs.labels }}
          # labels = metadata embedded in Docker image
          # includes: git commit, build date, repo URL

          platforms: linux/amd64,linux/arm64
          # build for both Intel (amd64) and Apple Silicon (arm64)
          # amd64 = AWS EC2, most cloud servers
          # arm64 = Mac M1/M2, AWS Graviton (cheaper)

          cache-from: type=gha
          cache-to: type=gha,mode=max
          # gha = GitHub Actions cache
          # cache Docker layers between workflow runs
          # only changed layers are rebuilt
          # dramatically speeds up subsequent builds

