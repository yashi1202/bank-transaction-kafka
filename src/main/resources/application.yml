spring:
  application:
    name: bank-transaction-kafka

  datasource:
    url: jdbc:postgresql://localhost:5432/bankdb
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: bank-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.bank.*"

kafka:
  topics:
    transaction-initiated: transaction-initiated
    fraud-check-result: fraud-check-result
    balance-update: balance-update
    notification: transaction-notification
    dead-letter: transaction-dlt
    
twilio:
  enabled: false
  accountSid: ${TWILIO_ACCOUNT_SID}
  authToken: ${TWILIO_AUTH_TOKEN}      # from twilio.com/console
  from-number: "+1234567890"   

server:
  port: 8080

logging:
  level:
    com.bank: DEBUG
    org.apache.kafka: WARN